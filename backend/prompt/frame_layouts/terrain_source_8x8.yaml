grid: [8, 8]
description: >
  Continuous terrain source sheet for reusable top-down RPG tiles. Generate one
  coherent RPG map ground field across the whole canvas, while mentally
  respecting an invisible 8x8 crop grid. Each future crop cell is one reusable
  terrain tile from the same RPG art family. Do not compose separate icons or
  independent cells. Avoid visible grid lines, gutters, borders, frames, labels,
  tile numbers, or UI marks.

  The terrain should read as one connected RPG ground region before it is
  sliced, with broad continuous shapes and edges aligned so most boundaries
  cross cell edges cleanly. Keep palette, lighting, outline weight, and pixel
  density consistent everywhere. Use simplified color clusters, clear readable
  tile silhouettes, and sparse hand-placed details instead of dense procedural
  material noise. Leave clean reusable samples: interior fill areas, soft edge
  areas, curved boundary areas, corner-like transition areas, sparse-detail
  variants, and denser-but-still-readable variants. Tile boundaries should
  avoid single unique landmarks that would make one crop unusable elsewhere.
frame_prompts:
  - "whole canvas: complete continuous terrain source image, no visible grid"
  - "invisible crop planning: 8x8 logical grid, each future tile remains useful after slicing"
  - "edge compatibility: details continue naturally across crop boundaries, with no drawn dividers"
  - "reuse intent: include repeated material motifs and several clean center/edge/transition samples"
negative_extra: >
  visible grid lines, gutters, labels, tile numbers, characters, props, roads,
  buildings, scene composition, perspective, cast shadows, black separators,
  thick outlines around cells, independent icons, mismatched texture scale,
  random unrelated texture cells, decorative frames, single central landmark,
  volcano cone, eruption plume, UI, text, photorealistic material texture,
  noisy raw texture sample, gritty surface scan, high-frequency speckle
